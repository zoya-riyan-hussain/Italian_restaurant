# Server
server.port=8090

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/italian_restaurant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=restaurant_user
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:63342,http://127.0.0.1:63342

# SQL Initialization - ONLY run data.sql on first startup, then set to NEVER
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
